      summary: Create leave request
      tags:
      - Leave
      responses:
        '200':
          description: Successful response
      description: '<p>This API is used for creating leave request against an employee.
        Create an leave request and returns leave request identifier.</p>

        '
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                employeeId: 444d61be-76c5-4f82-9107-31aa32a2f5df
                requestedBy: 444d61be-76c5-4f82-9107-31aa32a2f5df
                fromDate: '2023-11-03'
                toDate: '2023-11-03'
                fromSession: 0
                toSession: 1
                leaveTypeId: ABBE47B9-1AEF-4364-91E9-50EAD6C22E95
                reason: Health Issue
                note: casual Leave
