        <thead>

        <tr>

        <th>TimeType</th>

        <th>WorkerType</th>

        <th>MaritalStatus</th>

        </tr>

        </thead>

        <tbody>

        <tr>

        <td>0 - None  <br />1 - FullTime  <br />2 - PartTime</td>

        <td>0 - None  <br />1 - Permanent  <br />2 - Contingent</td>

        <td>0 - None  <br />1- Single  <br />2 - Married  <br />3 - Widowed  <br />4
        - Separated</td>

        </tr>

        </tbody>

        </table>

        </div><div class="click-to-expand-wrapper is-table-wrapper"><table>

        <thead>

        <tr>

        <th>Gender</th>

        <th>EmploymentStatus</th>

        <th>AccountStatus</th>

        </tr>

        </thead>

        <tbody>

        <tr>

        <td>0 - NotSpecified  <br />1 - Male  <br />2 - Female  <br />3 - Nonbinary  <br
        />4 - PreferNotToRespond</td>

        <td>0 - Working  <br />1- Relieved</td>

        <td>0 - NotRegistered  <br />1 - Registered  <br />2 - Disabled</td>

        </tr>

        </tbody>

        </table>

        </div><div class="click-to-expand-wrapper is-table-wrapper"><table>

        '
    post:
      operationId: create_employee
      summary: Create employee
      tags:
      - Core HR
      responses:
        '200':
          description: Successful response
      description: '<p>This API is used for creating a new Employee record.</p>

        <h2 id="enumerated-values">Enumerated Values</h2>

        <div class="click-to-expand-wrapper is-table-wrapper"><table>

        <thead>

        <tr>

        <th>TimeType</th>

        <th>WorkerType</th>

        <th>MaritalStatus</th>

        </tr>

        </thead>

        <tbody>

        <tr>

        <td>0 - None  <br />1 - FullTime  <br />2 - PartTime</td>

        <td>0 - None  <br />1 - Permanent  <br />2 - Contingent</td>

        <td>0 - None  <br />1- Single  <br />2 - Married  <br />3 - Widowed  <br />4
        - Separated</td>

        </tr>

        </tbody>

        </table>

        </div><div class="click-to-expand-wrapper is-table-wrapper"><table>

        <thead>

        <tr>

        <th>Gender</th>

        <th>EmploymentStatus</th>

        <th>AccountStatus</th>

        </tr>

        </thead>

        <tbody>

        <tr>

        <td>0 - NotSpecified  <br />1 - Male  <br />2 - Female  <br />3 - Nonbinary  <br
        />4 - PreferNotToRespond</td>

        <td>0 - Working  <br />1- Relieved</td>

        <td>0 - NotRegistered  <br />1 - Registered  <br />2 - Disabled</td>

        </tr>

        </tbody>

        </table>

        </div><div class="click-to-expand-wrapper is-table-wrapper"><table>

        <th'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                EmployeeNumber: '1234'
                DisplayName: Shubham Test
                FirstName: Shubham
                LastName: Test
                Email: shubhtest@test.com
                Gender: Male
                DateOfBirth: 09-08-1999
                DateJoined: 01-09-2021
                department: f5b7e125-d39c-4630-a332-6c97a265f953
