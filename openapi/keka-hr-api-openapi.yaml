    get:
      operationId: get_all_leave_requests
      summary: Get all leave requests
      tags:
      - Leave
      responses:
        '200':
          description: Successful response
      description: '<p>This API is used for fetching list of all leave requests in
        the organization between from and to date. If both from and to are not specified,
        last 30 days records are returned. From date should be before to date. The
        difference between from and to date cannot be more than 90 days.</p>

        <h2 id="enumerated-values">Enumerated Values</h2>

        <div class="click-to-expand-wrapper is-table-wrapper"><table>

        <thead>

        <tr>

        <th>SessionType</th>

        <th>LeaveRequestStatus</th>

        </tr>

        </thead>

        <tbody>

        <tr>

        <td>0 = FirstHalf  <br />1 = SecondHalf</td>

        <td>0 = Pending  <br />1 = Approved  <br />2 = Rejected  <br />3 = Cancelled  <br
        />4 = InApprovalProcess</td>

        </tr>

        </tbody>

        </table>

        </div>'
    post:
